---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Deploy hospital portal Nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/hospital
    owner: root
    group: root
    mode: '0644'
  notify: Reload Nginx

- name: Enable hospital site
  file:
    src: /etc/nginx/sites-available/hospital
    dest: /etc/nginx/sites-enabled/hospital
    state: link
  notify: Reload Nginx

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload Nginx

- name: Ensure web root exists
  file:
    path: "{{ web_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Deploy hospital index page
  copy:
    dest: "{{ web_root }}/index.html"
    owner: www-data
    group: www-data
    mode: '0644'
    content: |
      <!DOCTYPE html>
      <html>
      <head><title>{{ hospital_name }}</title></head>
      <body>
        <h1>{{ hospital_name }}</h1>
        <p>Hospital IT Systems — managed by Ansible</p>
      </body>
      </html>

- name: Ensure Nginx is running
  service:
    name: nginx
    state: started
    enabled: yes
