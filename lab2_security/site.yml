---
- name: Hospital Security Hardening
  hosts: all
  become: yes

  vars:
    hospital_admin_user: med-admin
    allowed_ssh_port: 22
    allowed_http_port: 80

  tasks:
    - name: Ensure UFW is installed
      apt:
        name: ufw
        state: present
        update_cache: yes

    - name: Allow SSH and HTTP through UFW
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "{{ allowed_ssh_port }}"
        - "{{ allowed_http_port }}"

    - name: Enable UFW with default deny policy
      ufw:
        state: enabled
        policy: deny

    - name: Disable SSH root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        state: present
      notify: Restart SSH

    - name: Disable SSH password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        state: present
      notify: Restart SSH

    - name: Ensure chrony is installed for time sync
      apt:
        name: chrony
        state: present

    - name: Ensure chrony is running
      service:
        name: chrony
        state: started
        enabled: yes

    - name: Ensure hospital admin user exists
      user:
        name: "{{ hospital_admin_user }}"
        state: present
        shell: /bin/bash
        groups: sudo
        append: yes

  handlers:
    - name: Restart SSH
      service:
        name: ssh
        state: restarted
