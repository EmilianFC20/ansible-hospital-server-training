---
- name: Healthcare Web Portal
  hosts: frontend
  become: yes

  vars:
    hospital_name: "City General Hospital"
    web_port: 80
    web_root: /var/www/html

  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Deploy hospital portal Nginx config
      template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/sites-available/hospital
        owner: root
        group: root
        mode: '0644'
      notify: Reload Nginx

    - name: Enable hospital site
      file:
        src: /etc/nginx/sites-available/hospital
        dest: /etc/nginx/sites-enabled/hospital
        state: link
      notify: Reload Nginx

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload Nginx

    - name: Create web root directory
      file:
        path: "{{ web_root }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Deploy placeholder index page
      copy:
        dest: "{{ web_root }}/index.html"
        content: |
          <!DOCTYPE html>
          <html>
          <head><title>{{ hospital_name }}</title></head>
          <body>
            <h1>{{ hospital_name }}</h1>
            <p>Patient Portal — {{ ansible_hostname }}</p>
          </body>
          </html>
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Ensure Nginx is running
      service:
        name: nginx
        state: started
        enabled: yes

  handlers:
    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded
